  function x(d, k){
    let o = "";
    for(let i=0;i<d.length;i++){
      o += String.fromCharCode(d.charCodeAt(i) ^ k);
    }
    return o;
  }

  try {
    const dec = x(d64(e), k);
    document.open();
    document.write(dec);
    document.close();
  } catch(err){
    document.body.innerHTML = "❌ Failed to load content";
  }
})();
</script>
</body>
